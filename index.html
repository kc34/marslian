<!DOCTYPE html>
<html>
<head>
<title>Marsdew Valley</title>
</head>
<body>

<canvas id="myCanvas">
Your browser does not support the canvas element.
</canvas>

<style>
html, body {
  width:  100%;
  height: 100%;
  margin: 0px;
  overflow: hidden;
}
</style>

<script src="js/main.js"></script>

<script>

var game = new Game();
setInterval(function() {
    game.tick();
}, 1000.0 / 60)

const canvas = document.getElementById("myCanvas");
// Need to set the canvas's width and height with this, to avoid stretching the canvas.
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


setInterval(function() { game.tick(); }, 1000.0 / 60)
const ctx = canvas.getContext("2d");
setInterval(function() { game.draw(ctx); }, 1000.0 / 60)
window.addEventListener('keydown', function(key) { game.keydownHandler(key); });
window.addEventListener('keyup', function(key) { game.keyupHandler(key); });
window.addEventListener('click', function(click) { game.clickHandler(click); });
game.start();
</script>

</body>
</html>
