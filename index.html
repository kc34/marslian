<!DOCTYPE html>
<html>
<head>
  <title>Marsdew Valley</title>
  <script src=https://unpkg.com/peerjs@1.5.5/dist/peerjs.js></script>
</head>
<body>
  <div>
    <h1>Lilian on Mars</h1>
  </div>
  <div style="display: flex">
    <div style="flex: 1">
      <p>Corn Count: <span id="corn-count">0</span></p>

      <p>Corn Seed Count: <span id="corn-seed-count">0</span></p>
    </div>
    <div style="flex: 2">
      canvas1
      <canvas id="myCanvas">
      Your browser does not support the canvas element.
      </canvas>
    </div>
    <div style="flex: 1">
      <button id="host-button">Host?</button>
      <span id="my-id">No ID yet...</span>
    </div>
  </div>

  <style>
    html, body {
      width:  100%;
      height: 100%;
      margin: 0px;
      overflow: hidden;
    }
  </style>

  <script src="js/main.js"></script>

  <script>
    const message = "hello!";
    var localHost = new LocalHost();
    setInterval(function() {
        localHost.tick();
    }, 1000.0 / 60)

    var localClient = new LocalClient(localHost, "W", "S", "A", "D");
    setInterval(function() {
        localClient.tick();
    }, 1000.0 / 60)

    const canvas = document.getElementById("myCanvas");
    // Need to set the canvas's width and height with this, to avoid stretching the canvas.
    canvas.width = window.innerWidth / 2;
    canvas.height = window.innerHeight / 2;

    setInterval(function() { localClient.draw(canvas); }, 1000.0 / 60)
    window.addEventListener('keydown', function(key) { localClient.keydownHandler(key); });
    window.addEventListener('keyup', function(key) { localClient.keyupHandler(key); });
    canvas.addEventListener('click', function(click) { localClient.clickHandler(click); });

    // networking when someone clicks on the host button
    const hostButton = document.getElementById('host-button');
    hostButton.addEventListener('click', function() {
      peer = new Peer();

      peer.on('open', (id) => {
        const idSpan = document.getElementById('my-id');
        idSpan.textContent = id;
      })

      peer.on('connection', (incomingConn) => {
        console.log("someone connected!");
        var remoteClient;
        incomingConn.on('open', () => {
          remoteClient = new RemoteClient(localHost, incomingConn);
        })

        incomingConn.on('data', (data) => {
          remoteClient.handleData(data);
        });
      });
    });
  </script>

  </body>
</html>
