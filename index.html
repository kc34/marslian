<!DOCTYPE html>
<html>
<head>
  <title>Marsdew Valley</title>
  <script src=https://unpkg.com/peerjs@1.5.5/dist/peerjs.js></script>
</head>
<body>
  <div id="menu-screen" class="full-screen">
    <h1>Lilian on Mars</h1>
    <div id="main-menu">
      <div>
        <input type="text" id="username-input" placeholder="Enter Username" value="Lilian <3" />
        <input type="color" id="color-picker-input" value="#7b00ff" />
      </div>
      <button id="single-player-button">
        Singleplayer
      </button>
      <button id="multi-player-button">
        Multiplayer
      </button>
    </div>
    <div id="multi-player-menu" style="display: none">
      <button id="host-button">
        Host
      </button>
      or
      <input type="text" id="remote-id-input" placeholder="Enter ID">
      <button id="connect-button">Join</button>
    </div>
  </div>
  <div id="game-screen" style="display: none" class="full-screen">
    <div style="position: fixed; top: 0; left: 0; height: 0%;">
      <button id="in-game-host-button">Host?</button>
      <span id="my-id">No ID yet...</span>
    </div>
    <div style="width: 100%; height: 100%;">
      <canvas id="myCanvas">
      Your browser does not support the canvas element.
      </canvas>
    </div>
    <div style="position: fixed; top: 0; right: 0; width: 25%; height: 25%;">
    </div>
  </div>

  <style>
    html, body, div.full-screen {
      width:  100%;
      height: 100%;
      margin: 0px;
      overflow: hidden;
    }
  </style>

  <script src="js/packet.js"></script>
  <script src="js/event.js"></script>
  <script src="js/component.js"></script>
  <script src="js/real-main.js"></script>
  <script src="js/main.js"></script>

  </body>
</html>
