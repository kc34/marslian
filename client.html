<!DOCTYPE html>
<html>
<head>
  <title>Marsdew Valley</title>
  <script src=https://unpkg.com/peerjs@1.5.5/dist/peerjs.js></script>
</head>
<body>
  <div>
    <h1>Lilian on Mars</h1>
  </div>
  <div style="display: flex">
    <div style="flex: 1">
      <p>Corn Count: <span id="corn-count">0</span></p>

      <p>Corn Seed Count: <span id="corn-seed-count">0</span></p>
    </div>
    <div style="flex: 2">
      canvas1
      <canvas id="myCanvas">
      Your browser does not support the canvas element.
      </canvas>
    </div>
    <div style="flex: 1">
      <input type="text" id="remote-id-input" placeholder="Enter ID">
      <button id="connect-button">Connect</button>
    </div>
  </div>

  <style>
    html, body {
      width:  100%;
      height: 100%;
      margin: 0px;
      overflow: hidden;
    }
  </style>

  <script src="js/main.js"></script>

  <script>
    const remoteIdInput = document.getElementById("remote-id-input");
    const connectButton = document.getElementById("connect-button");

    const peer = new Peer();

    connectButton.addEventListener('click', () => {
    
      const hostConn = peer.connect(remoteIdInput.value.trim());

      console.log("attempting connection: "+ remoteIdInput.value.trim());
      hostConn.on('open', () => {
        console.log("connected!");
        var remoteHost = new RemoteHost(hostConn);
        var viewController = new ClientModel(remoteHost, "W", "S", "A", "D");
        setInterval(function() {
          viewController.tick();
        }, 1000.0 / 60)

        const canvas = document.getElementById("myCanvas");
        // Need to set the canvas's width and height with this, to avoid stretching the canvas.
        canvas.width = window.innerWidth / 2;
        canvas.height = window.innerHeight / 2;

        setInterval(function() { viewController.draw(canvas); }, 1000.0 / 60)
        window.addEventListener('keydown', function(key) { viewController.keydownHandler(key); });
        window.addEventListener('keyup', function(key) { viewController.keyupHandler(key); });
        canvas.addEventListener('click', function(click) { viewController.clickHandler(click); });

        hostConn.on('data', (data) => {
          remoteHost.handleData(data);
        });
      })
    });
  </script>

  </body>
</html>
